<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Khiển - Đào Thái Hưng</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: var(--primary-color); font-size: 1.5rem; }
        .status-box {
            background: #e8f4fd;
            padding: 1rem;
            border-radius: 10px;
            margin: 1.5rem 0;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2980b9; transform: scale(1.05); }
        .footer { margin-top: 1.5rem; font-size: 0.8rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Smart Control Hub</h1>
        <p>Xin chào, <strong>Đào Thái Hưng</strong></p>
        
        <div class="status-box">
            <p>Trạng thái hệ thống: <span style="color: #27ae60; font-weight: bold;">Online</span></p>
            <p>Nhiệt độ: <span id="temp">28</span>°C</p>
        </div>

        <button class="btn" onclick="toggleDevice()">Bật/Tắt Thiết Bị</button>

        <div class="footer">
            Dự án đang chạy trên Render <br>
            © 2026 Telecommunications Project
        </div>
    </div>

    <script>
        function toggleDevice() {
            alert("Đã gửi lệnh điều khiển tới hệ thống!");
        }
    </script>
</body>
</html>
